---
name: Generate Terraform README docs
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
permissions: {}
jobs:
  docs:
    permissions:
      pull-requests: write
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Render terraform docs and push changes back to PR
        uses: terraform-docs/gh-actions@6de6da0cefcc6b4b7a5cbea4d79d97060733093c # v1.4.1
        with:
          working-dir: .
          output-file: README.md
          output-method: inject
          git-push: "false"
      - name: Fix Git permissions
        run: sudo chown -R $(whoami) .git/
      - name: Run Signed Commit Action
        uses: ministryofjustice/modernisation-platform-github-actions/signed-commit@40972648982915f26e5b5e22bd92f3af9297a707 # v6.1.7
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
